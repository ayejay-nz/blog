services:
    db:
        image: postgres:15
        environment:
            POSTGRES_USER: postgres
            POSTGRES_PASSWORD: pass
            POSTGRES_DB: appdb
        volumes:
            - db-data:/var/lib/postgresql/data
        ports:
            - '5432:5432'

    server:
        build:
            context: ./server
            dockerfile: Dockerfile.dev
        env_file: ./server/.env
        depends_on:
            - db
        volumes:
            - ./server:/app
            - /app/node_modules
        ports:
            - '4000:4000'

